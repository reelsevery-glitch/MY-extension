<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <title>MyEstate პანელი</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
    .header {
      background: #16213e;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #0f3460;
    }
    .header h1 { font-size: 15px; color: #9c27b0; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .user-info { font-size: 12px; color: #aaa; }
    .close-btn {
      background: #b71c1c;
      color: white;
      border: none;
      border-radius: 6px;
      width: 28px; height: 28px;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold;
    }
    .close-btn:hover { background: #d32f2f; }
    .tabs { display: flex; background: #16213e; border-bottom: 1px solid #0f3460; }
    .tab { padding: 10px 20px; cursor: pointer; font-size: 13px; color: #aaa; border-bottom: 2px solid transparent; }
    .tab.active { color: #9c27b0; border-bottom-color: #9c27b0; }
    .content { padding: 16px; max-height: calc(100vh - 90px); overflow-y: auto; }
    .draft-card {
      background: #16213e; border: 1px solid #0f3460; border-radius: 8px;
      padding: 12px; margin-bottom: 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .draft-info { flex: 1; }
    .draft-title { font-size: 13px; font-weight: bold; margin-bottom: 4px; }
    .draft-meta { font-size: 11px; color: #888; }
    .draft-badges { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
    .badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: bold; }
    .badge-ss { background: #1a237e; color: #90caf9; }
    .badge-myhome { background: #1b5e20; color: #a5d6a7; }
    .badge-source { background: #4a148c; color: #ce93d8; }
    .draft-actions { display: flex; gap: 6px; flex-direction: column; margin-left: 10px; }
    .btn { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; }
    .btn:hover { opacity: 0.8; }
    .btn-ss { background: #1565c0; color: white; }
    .btn-myhome { background: #2e7d32; color: white; }
    .btn-delete { background: #b71c1c; color: white; }
    .empty { text-align: center; padding: 40px; color: #666; font-size: 13px; line-height: 2; }
    .loading { text-align: center; padding: 40px; color: #9c27b0; }
    .toast {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: #9c27b0; color: white; padding: 8px 18px;
      border-radius: 8px; font-size: 13px; display: none; z-index: 9999;
    }
  </style>
</head>
<body>
<div class="header">
  <h1>🏠 MyEstate</h1>
  <div class="header-right">
    <span class="user-info" id="user_info"></span>
    <button class="close-btn" onclick="closePanel()" title="დახურვა">✕</button>
  </div>
</div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('drafts')">📋 დრაფტები</div>
  <div class="tab" onclick="switchTab('help')">❓ დახმარება</div>
</div>
<div class="content" id="content">
  <div class="loading">⏳ იტვირთება...</div>
</div>
<div class="toast" id="toast"></div>
<script>
  const params = new URLSearchParams(window.location.search);
  const TOKEN = params.get('token');
  const API = window.location.origin + '/';
  let drafts = [];

  function closePanel() {
    window.parent.postMessage({ type: 'CLOSE_BASE_MODAL' }, '*');
  }

  async function init() {
    if (!TOKEN) { document.getElementById('content').innerHTML = '<div class="empty">❌ ტოკენი არ არის</div>'; return; }
    try {
      const userRes = await fetch(API + 'auth/login/access-token', {
        method: 'POST', headers: { 'Authorization': 'Bearer ' + TOKEN }
      });
      const userData = await userRes.json();
      if (userData.user) document.getElementById('user_info').textContent = userData.user.name || userData.user.phone || '';
    } catch(e) {}
    await loadDrafts();
  }

  async function loadDrafts() {
    try {
      const res = await fetch(API + 'drafts', { headers: { 'Authorization': 'Bearer ' + TOKEN } });
      drafts = await res.json();
      renderDrafts();
    } catch(e) {
      document.getElementById('content').innerHTML = '<div class="empty">❌ სერვერთან კავშირი ვერ მოხდა</div>';
    }
  }

  function renderDrafts() {
    if (!drafts.length) {
      document.getElementById('content').innerHTML = `
        <div class="empty">
          📭 დრაფტები არ არის<br>
          <small>ss.ge ან myhome.ge-ზე განცხადებაზე გადადი<br>და 💾 ღილაკს დააჭირე</small>
        </div>`;
      return;
    }
    document.getElementById('content').innerHTML = drafts.map(d => `
      <div class="draft-card">
        <div class="draft-info">
          <div class="draft-title">${d.title || 'განცხადება #' + d.id}</div>
          <div class="draft-meta">${new Date(d.created_at).toLocaleDateString('ka-GE')}</div>
          <div class="draft-badges">
            <span class="badge badge-source">${d.source === 'ss' ? 'SS.GE' : 'MYHOME'}</span>
            ${d.ss_id ? '<span class="badge badge-ss">✅ SS</span>' : ''}
            ${d.myhome_id ? '<span class="badge badge-myhome">✅ MH</span>' : ''}
          </div>
        </div>
        <div class="draft-actions">
          <button class="btn btn-ss" onclick="uploadToSS(${d.id})">🏠 SS.GE</button>
          <button class="btn btn-myhome" onclick="uploadToMyhome(${d.id})">🏡 Myhome</button>
          <button class="btn btn-delete" onclick="deleteDraft(${d.id})">🗑️</button>
        </div>
      </div>`).join('');
  }

  function uploadToSS(id) {
    closePanel();
    window.open(`https://home.ss.ge/ka/udzravi-qoneba/create/SH-${id}`, '_blank');
  }

  function uploadToMyhome(id) {
    closePanel();
    window.open(`https://www.myhome.ge/ka/SH-${id}`, '_blank');
  }

  async function deleteDraft(id) {
    if (!confirm('წაიშალოს?')) return;
    await fetch(API + 'drafts/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + TOKEN } });
    drafts = drafts.filter(d => d.id !== id);
    renderDrafts();
    showToast('წაიშალა ✅');
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'drafts') || (i === 1 && tab === 'help'));
    });
    if (tab === 'drafts') { loadDrafts(); return; }
    document.getElementById('content').innerHTML = `
      <div style="padding:10px;font-size:13px;line-height:2;color:#ccc;">
        <p><strong style="color:#9c27b0">როგორ გამოვიყენო?</strong></p>
        <p>1. გადადი ss.ge ან myhome.ge-ზე</p>
        <p>2. გახსენი ნებისმიერი განცხადება</p>
        <p>3. დააჭირე 💾 ღილაკს — შეინახება</p>
        <p>4. გახსენი პანელი 📋 ღილაკით</p>
        <p>5. აირჩიე სად გინდა ატვირთვა</p>
        <p style="color:#666;font-size:11px;margin-top:10px;">⚠️ სერვერი და cloudflared ჩართული უნდა იყოს</p>
      </div>`;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2500);
  }

  init();
</script>
</body>
</html>
